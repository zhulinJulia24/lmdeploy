        continue-on-error: true
        if: contains(fromJSON(${{github.event.inputs.backend}}), 'turbomind') && contains(fromJSON(${{github.event.inputs.model}}), 'interface-pipeline')
        timeout-minutes: 20
        run: |
          echo 'here'
      - name: Test lmdeploy - rerun all fail cases
        timeout-minutes: 30
        run: |
          echo 'here'
    


