name: test_matrix


on:
  workflow_dispatch:
    inputs:
      repo_org:
        required: false
        description: 'Tested repository organization name. Default is InternLM'
        type: string
        default: InternLM
      repo_ref:
        required: false
        description: 'Set branch or tag or commit id. Default is "main"'
        type: string
        default: 'main'
      need_build:
        required: true
        description: 'Whether do build according to the input repo info. Default is false, which means use the latest docker image'
        type: boolean
        default: false
      model_name:
        required: true
        description: 'Set benchmark models, once a time'
        type: string
        default: 'internlm/internlm2-chat-20b'
      cover_type:        
        required: true
        description: 'Set benchmark models, once a time'
        type: string
        default: 'internlm/internlm2-chat-20b'
      devices:
        required: true
        description: 'CUDA_VISIBLE_DEVICES.'
        type: string
        default: '6,7'

env:
  HOST_PIP_CACHE_DIR: /nvme/github-actions/pip-cache
  HOST_LOCALTIME: /usr/share/zoneinfo/Asia/Shanghai



jobs:
  test_matrix:
    runs-on: [self-hosted, linux-a100]
    timeout-minutes: 240
    strategy:
      matrix:
        model_name: ${{fromJSON(github.event.inputs.model_name)}}
        include:
          - model_name: internlm/internlm2-chat-20b
            args: --tp 2  --concurrency 256 --cache-max-entry-count 0.9
          - model_name: internlm/internlm2-chat-20b-inner-w4a16
            args: --tp 2 --model-format awq  --concurrency 256 --cache-max-entry-count 0.9
          - model_name: meta-llama/Llama-2-7b-chat-hf
            args: --tp 1 --concurrency 256 --cache-max-entry-count 0.95
          - model_name: meta-llama/Llama-2-7b-chat-hf-inner-w4a16
            args: --tp 1 --model-format awq  --concurrency 256 --cache-max-entry-count 0.95
    env:
      MODEL_PATH: /mnt/bigdisk/qa_test_models
      WORK_DIR: /nvme/qa_test_models
      GRPC_PORT: 33337
    steps:
      - name: echo
        run: |
          echo ${{ matrix.model_name }}
          echo ${{ matrix.args }}
